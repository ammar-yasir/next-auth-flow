name: Deploy Next SaaS App

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/next-saas:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/next-saas:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            docker pull ${{ secrets.DOCKER_USERNAME }}/next-saas:latest

            docker stop next-app || true
            docker rm next-app || true

            docker run -d \
              --name next-app \
              -p 3000:3000 \
              --restart unless-stopped \
              --env-file /home/ubuntu/.env.production \
              ${{ secrets.DOCKER_USERNAME }}/next-saas:latest